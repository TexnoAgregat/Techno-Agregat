<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спасибо за заявку | Техно Агрегат</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c10;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(46, 125, 50, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(76, 175, 80, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 600px;
            width: 90%;
            margin: 0 auto;
            padding: 20px;
        }

        .thankyou-card {
            background: rgba(20, 25, 35, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 60px 40px;
            border: 1px solid rgba(76, 175, 80, 0.2);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.7);
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .thankyou-icon {
            font-size: 6rem;
            color: #4caf50;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 30px rgba(76, 175, 80, 0.3));
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            color: #9aa0a8;
            margin-bottom: 30px;
            line-height: 1.6;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .thankyou-message {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 24px;
            padding: 20px;
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            max-width: 350px;
        }

        .thankyou-message i {
            color: #4caf50;
            font-size: 1.5rem;
        }

        .thankyou-message span {
            color: #ffffff;
            font-size: 1.1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 36px;
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(46, 125, 50, 0.4);
            background: linear-gradient(135deg, #388e3c, #2e7d32);
        }

        @media (max-width: 768px) {
            .thankyou-card {
                padding: 40px 25px;
            }
            h1 {
                font-size: 2.2rem;
            }
            .thankyou-icon {
                font-size: 4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="thankyou-card">
            <div class="thankyou-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>Спасибо за заявку!</h1>
            <p>Ваша заявка успешно отправлена. Наш менеджер свяжется с вами в ближайшее время.</p>
            <div class="thankyou-message">
                <i class="fas fa-clock"></i>
                <span>Обычно мы отвечаем в течение 15-30 минут</span>
            </div>
            <a href="index.html" class="btn">
                <i class="fas fa-home"></i>
                Вернуться на главную
            </a>
        </div>
    </div>
</body>
</html>
